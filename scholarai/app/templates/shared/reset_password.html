<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarAI — Reset Password</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--navy);
        padding: 20px;
    }
    .reset-card {
        background: var(--white);
        width: 100%;
        max-width: 440px;
        padding: 40px;
        border-top: 4px solid var(--blue);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .reset-title {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 8px;
        color: var(--navy);
        font-family: var(--mono);
    }
    .reset-sub {
        font-size: 13px;
        color: var(--text-lt);
        margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="reset-card">
    <div class="reset-title">Create New Password</div>
    <div class="reset-sub">Please enter a strong new password to protect your account.</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert {{ 'success' if cat == 'success' else 'danger' }}" style="margin-bottom:20px;">
          <span class="alert__icon">{{ '✓' if cat == 'success' else '⚠' }}</span>
          <div class="alert__text"><strong>{{ msg }}</strong></div>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="login-form">
      <div class="form-group">
        <label class="form-label" style="color:var(--text-lt);">New Password</label>
        <input type="password" name="password" class="form-control" placeholder="New Password" required />
      </div>
      <div class="form-group">
        <label class="form-label" style="color:var(--text-lt);">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required />
      </div>
      <button type="submit" class="btn btn-primary full" style="padding:13px; font-size:14px; letter-spacing:0.05em; margin-top:8px;">UPDATE PASSWORD →</button>
    </form>
  </div>
</body>
</html>
